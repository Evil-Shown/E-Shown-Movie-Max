<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHITHRA CINEMA — Hollywood Projector Edition</title>
  <style>
    :root {
      /* Deep Cinema Backgrounds */
      --bg-deep: #020202;
      --bg-dark: #050505;
      --bg-surface: #0a0a12;
      --bg-elevated: #120b1e;

      /* Luxury Gold Palette */
      --gold-primary: #F4C96A;
      --gold-bright: #FFD976;
      --gold-warm: #E5A84B;
      --gold-glow: rgba(244, 201, 106, 0.4);
      --gold-subtle: rgba(244, 201, 106, 0.15);

      /* Cinematic Purple Accents */
      --purple-primary: #8B5CF6;
      --purple-light: #B794F4;
      --purple-glow: rgba(139, 92, 246, 0.35);

      /* Pure White Highlights */
      --white-pure: #FFFFFF;
      --white-glow: rgba(255, 255, 255, 0.7);

      /* Typography System */
      --font-display: "Cinzel", "Times New Roman", serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-sinhala: "Noto Serif Sinhala", serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      font-family: var(--font-body);
      overflow: hidden;
      position: relative;
      cursor: default;
      user-select: none;
    }

    /* ═══════════════════════════════════════════
           LAYER 1: ATMOSPHERIC BACKGROUND SYSTEM
           ═══════════════════════════════════════════ */

    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .vignette-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
          transparent 20%,
          rgba(2, 2, 2, 0.6) 60%,
          #000 100%);
      z-index: 10;
    }

    .film-grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grainShift 0.4s steps(3) infinite;
      z-index: 11;
    }

    @keyframes grainShift {

      0%,
      100% {
        transform: translate(0, 0);
      }

      33% {
        transform: translate(-10px, 15px);
      }

      66% {
        transform: translate(15px, -10px);
      }
    }

    /* Ambient room glow from projector */
    .ambient-glow {
      position: absolute;
      left: -10%;
      top: 30%;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle,
          rgba(244, 201, 106, 0.08) 0%,
          transparent 70%);
      filter: blur(60px);
      animation: ambientPulse 6s ease-in-out infinite alternate;
      z-index: 2;
    }

    @keyframes ambientPulse {
      0% {
        opacity: 0.4;
        transform: scale(1);
      }

      100% {
        opacity: 0.8;
        transform: scale(1.15);
      }
    }

    /* ═══════════════════════════════════════════
           LAYER 2: PROJECTOR HARDWARE UNIT (LEFT SIDE)
           ═══════════════════════════════════════════ */

    .projector-unit {
      position: fixed;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      animation: projectorSlideIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes projectorSlideIn {
      0% {
        opacity: 0;
        transform: translateY(-50%) translateX(-100px);
      }

      100% {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    .projector-body {
      width: 140px;
      height: 180px;
      background: linear-gradient(145deg, #1a1525 0%, #0d0a14 100%);
      border-radius: 16px;
      border: 2px solid rgba(244, 201, 106, 0.25);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 40px var(--gold-glow);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* Main projector lens assembly */
    .lens-housing {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d2244 0%, #15101f 100%);
      border: 3px solid var(--gold-primary);
      box-shadow:
        0 0 30px var(--gold-glow),
        inset 0 0 20px rgba(0, 0, 0, 0.8);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: lensGlow 3s ease-in-out infinite alternate;
    }

    @keyframes lensGlow {
      0% {
        box-shadow:
          0 0 30px var(--gold-glow),
          0 0 60px rgba(244, 201, 106, 0.2),
          inset 0 0 20px rgba(0, 0, 0, 0.8);
      }

      100% {
        box-shadow:
          0 0 50px var(--gold-glow),
          0 0 100px rgba(244, 201, 106, 0.35),
          inset 0 0 20px rgba(0, 0, 0, 0.8);
      }
    }

    .lens-core {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
          var(--gold-bright) 0%,
          var(--gold-primary) 40%,
          var(--gold-warm) 70%,
          #996520 100%);
      box-shadow:
        0 0 20px var(--gold-bright),
        0 0 40px var(--gold-glow),
        inset 0 0 15px rgba(255, 255, 255, 0.3);
      animation: corePulse 2s ease-in-out infinite;
    }

    @keyframes corePulse {

      0%,
      100% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.08);
        filter: brightness(1.3);
      }
    }

    /* Lens reflection rings */
    .lens-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(244, 201, 106, 0.3);
    }

    .lens-ring:nth-child(1) {
      inset: 8px;
    }

    .lens-ring:nth-child(2) {
      inset: 16px;
    }

    /* Projector ventilation details */
    .vent-slots {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 8px;
    }

    .vent-slot {
      width: 60px;
      height: 3px;
      background: rgba(244, 201, 106, 0.15);
      border-radius: 2px;
    }

    /* Power indicator LED */
    .power-led {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
      animation: ledBlink 2s ease-in-out infinite;
    }

    @keyframes ledBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* ═══════════════════════════════════════════
           LAYER 3: VOLUMETRIC LIGHT BEAM
           ═══════════════════════════════════════════ */

    .light-beam-container {
      position: fixed;
      left: 170px;
      top: 50%;
      transform: translateY(-50%);
      width: calc(100vw - 220px);
      height: 400px;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      animation: beamIgnite 1.5s ease-out 1.2s forwards;
    }

    @keyframes beamIgnite {
      0% {
        opacity: 0;
        clip-path: polygon(0 50%, 0 50%, 0 50%, 0 50%);
      }

      50% {
        opacity: 0.6;
      }

      100% {
        opacity: 1;
        clip-path: polygon(0 42%, 100% 0%, 100% 100%, 0 58%);
      }
    }

    /* Main volumetric beam */
    .volumetric-beam {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
          rgba(255, 217, 118, 0.95) 0%,
          rgba(255, 217, 118, 0.55) 15%,
          rgba(255, 217, 118, 0.25) 40%,
          rgba(255, 217, 118, 0.08) 70%,
          transparent 100%);
      filter: blur(25px);
      clip-path: polygon(0 45%, 100% 0%, 100% 100%, 0 55%);
      animation: beamShimmer 4s ease-in-out infinite;
    }

    @keyframes beamShimmer {

      0%,
      100% {
        opacity: 0.85;
        filter: blur(25px) brightness(1);
      }

      50% {
        opacity: 1;
        filter: blur(28px) brightness(1.15);
      }
    }

    /* Inner bright core of beam */
    .beam-core {
      position: absolute;
      left: 0;
      top: 48%;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(255, 217, 118, 0.6) 30%,
          rgba(255, 217, 118, 0.2) 60%,
          transparent 100%);
      filter: blur(2px);
    }

    /* Beam edge rays */
    .beam-rays {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
          transparent 0px,
          transparent 40px,
          rgba(255, 217, 118, 0.03) 40px,
          rgba(255, 217, 118, 0.03) 41px);
      clip-path: polygon(0 46%, 100% 2%, 100% 98%, 0 54%);
      animation: rayScan 8s linear infinite;
    }

    @keyframes rayScan {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(80px);
      }
    }

    /* ═══════════════════════════════════════════
           LAYER 4: DUST PARTICLE SYSTEM (CANVAS)
           ═══════════════════════════════════════════ */

    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 16;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════
           LAYER 5: DUAL FILM REEL SYSTEM
           ═══════════════════════════════════════════ */

    .film-reel-system {
      position: fixed;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 18;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 280px;
      opacity: 0;
      animation: reelsAppear 1s ease-out 2s forwards;
    }

    @keyframes reelsAppear {
      0% {
        opacity: 0;
        transform: translateY(-50%) scale(0.8);
      }

      100% {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }
    }

    .reel-assembly {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .film-reel {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: conic-gradient(from 0deg,
          #1a1525 0deg,
          #2d2244 90deg,
          #1a1525 180deg,
          #2d2244 270deg,
          #1a1525 360deg);
      border: 4px solid var(--gold-primary);
      box-shadow:
        0 0 40px var(--gold-glow),
        0 10px 40px rgba(0, 0, 0, 0.6),
        inset 0 0 30px rgba(0, 0, 0, 0.8);
      position: relative;
      animation: reelSpin 8s linear infinite;
    }

    .reel-top {
      animation-direction: normal;
    }

    .reel-bottom {
      animation-direction: reverse;
    }

    @keyframes reelSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Reel cutouts (spokes) */
    .reel-spoke {
      position: absolute;
      width: 35px;
      height: 35px;
      background: var(--bg-deep);
      border-radius: 50%;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      border: 1px solid rgba(244, 201, 106, 0.25);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .reel-spoke:nth-child(1) {
      transform: translateX(-50%) rotate(0deg) translateY(-38px);
    }

    .reel-spoke:nth-child(2) {
      transform: translateX(-50%) rotate(72deg) translateY(-38px);
    }

    .reel-spoke:nth-child(3) {
      transform: translateX(-50%) rotate(144deg) translateY(-38px);
    }

    .reel-spoke:nth-child(4) {
      transform: translateX(-50%) rotate(216deg) translateY(-38px);
    }

    .reel-spoke:nth-child(5) {
      transform: translateX(-50%) rotate(288deg) translateY(-38px);
    }

    /* Center hub */
    .reel-hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d2244 0%, #15101f 100%);
      border: 2px solid var(--gold-bright);
      box-shadow: 0 0 20px var(--gold-glow);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hub-center {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--gold-primary);
      box-shadow: 0 0 10px var(--gold-bright);
    }

    /* Animated film strip connecting reels */
    .film-strip-vertical {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 180px;
      width: 36px;
      height: 260px;
      background: repeating-linear-gradient(180deg,
          #111 0px,
          #111 18px,
          #1a1a1a 18px,
          #1a1a1a 20px,
          #111 20px,
          #111 38px);
      border: 1px solid rgba(244, 201, 106, 0.2);
      overflow: hidden;
      animation: filmScroll 1.5s linear infinite;
    }

    @keyframes filmScroll {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 0 40px;
      }
    }

    /* Sprocket holes on film strip */
    .film-strip-vertical::before,
    .film-strip-vertical::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 100%;
      background: repeating-linear-gradient(180deg,
          transparent 0px,
          transparent 8px,
          rgba(244, 201, 106, 0.3) 8px,
          rgba(244, 201, 106, 0.3) 13px,
          transparent 13px,
          transparent 21px);
    }

    .film-strip-vertical::before {
      left: 2px;
    }

    .film-strip-vertical::after {
      right: 2px;
    }

    /* ═══════════════════════════════════════════
           LAYER 6: LOGO REVEAL CONTAINER (CENTER-RIGHT)
           ═══════════════════════════════════════════ */

    .logo-container {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-60%, -50%);
      z-index: 25;
      text-align: center;
      opacity: 0;
      animation: logoMaterialize 1.5s ease-out 2.8s forwards;
    }

    @keyframes logoMaterialize {
      0% {
        opacity: 0;
        filter: blur(20px) brightness(2);
        transform: translate(-60%, -50%) scale(0.9);
      }

      100% {
        opacity: 1;
        filter: blur(0) brightness(1);
        transform: translate(-60%, -50%) scale(1);
      }
    }

    /* Glassmorphism card behind logo */
    .logo-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 50px 60px;
      box-shadow:
        0 0 80px rgba(244, 201, 106, 0.12),
        0 25px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    /* Subtle glass shine effect */
    .logo-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 50%,
          transparent 100%);
      animation: glassShine 6s ease-in-out infinite;
    }

    @keyframes glassShine {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(150%);
      }
    }

    /* Main title with letter-by-letter reveal */
    .main-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 8px;
      position: relative;
    }

    .title-letter {
      display: inline-block;
      background: linear-gradient(180deg,
          #ffffff 0%,
          var(--gold-bright) 25%,
          var(--gold-primary) 50%,
          var(--gold-warm) 75%,
          #ffffff 100%);
      background-size: 100% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      transform: translateY(30px) rotateX(-90deg);
      animation: letterReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      filter: drop-shadow(0 0 30px var(--gold-glow));
      text-shadow: none;
    }

    @keyframes letterReveal {
      0% {
        opacity: 0;
        transform: translateY(30px) rotateX(-90deg);
      }

      100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg);
      }
    }

    /* Staggered delay for each letter */
    .title-letter:nth-child(1) {
      animation-delay: 3.0s;
    }

    .title-letter:nth-child(2) {
      animation-delay: 3.1s;
    }

    .title-letter:nth-child(3) {
      animation-delay: 3.2s;
    }

    .title-letter:nth-child(4) {
      animation-delay: 3.3s;
    }

    .title-letter:nth-child(5) {
      animation-delay: 3.4s;
    }

    .title-letter:nth-child(6) {
      animation-delay: 3.5s;
    }

    .title-letter:nth-child(7) {
      animation-delay: 3.6s;
    }

    /* Gold shimmer animation on revealed letters */
    .main-title.revealed .title-letter {
      animation: goldShimmer 3s ease-in-out infinite;
    }

    @keyframes goldShimmer {

      0%,
      100% {
        background-position: 0% 0%;
      }

      50% {
        background-position: 0% 100%;
      }
    }

    /* Subtitle */
    .subtitle-line {
      font-family: var(--font-sinhala);
      font-size: 1.15rem;
      color: var(--gold-primary);
      letter-spacing: 0.4em;
      margin-bottom: 28px;
      opacity: 0;
      animation: subtitleFade 0.8s ease-out 4.2s forwards;
    }

    @keyframes subtitleFade {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Decorative separator */
    .ornament-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: ornamentFade 0.6s ease-out 4.4s forwards;
    }

    @keyframes ornamentFade {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 0.6;
      }
    }

    .ornament-line {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
    }

    .ornament-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold-primary);
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    /* ═══════════════════════════════════════════
           LAYER 7: CIRCULAR PROGRESS RING
           ═══════════════════════════════════════════ */

    .progress-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: progressFade 0.8s ease-out 4.6s forwards;
    }

    @keyframes progressFade {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .progress-ring-container {
      position: relative;
      width: 130px;
      height: 130px;
    }

    .progress-ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 8;
    }

    .ring-progress {
      fill: none;
      stroke: url(#progressGradient);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 339.292;
      stroke-dashoffset: 339.292;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 12px var(--gold-primary));
    }

    .ring-glow {
      fill: none;
      stroke: var(--gold-primary);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 339.292;
      stroke-dashoffset: 339.292;
      filter: blur(8px);
      opacity: 0.5;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .percentage-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .percent-value {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold-bright);
      text-shadow: 0 0 20px var(--gold-glow);
      line-height: 1;
    }

    .percent-symbol {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    /* Status message */
    .status-message {
      font-family: var(--font-body);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(184, 174, 158, 0.8);
      max-width: 240px;
      text-align: center;
      min-height: 20px;
      transition: all 0.3s ease;
    }

    /* ═══════════════════════════════════════════
           LAYER 8: LENS FLARE EFFECTS
           ═══════════════════════════════════════════ */

    .flare-system {
      position: fixed;
      inset: 0;
      z-index: 17;
      pointer-events: none;
      opacity: 0;
      animation: flareIgnite 1s ease-out 2.5s forwards;
    }

    @keyframes flareIgnite {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    .anamorphic-flare {
      position: absolute;
      top: 50%;
      left: 25%;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(139, 92, 246, 0.3) 20%,
          rgba(93, 169, 255, 0.5) 45%,
          rgba(255, 255, 255, 0.9) 50%,
          rgba(93, 169, 255, 0.5) 55%,
          rgba(244, 201, 106, 0.3) 80%,
          transparent 100%);
      filter: blur(1px);
      transform: translateY(-50%);
      animation: flarePulse 5s ease-in-out infinite;
    }

    @keyframes flarePulse {

      0%,
      100% {
        opacity: 0.5;
        transform: translateY(-50%) scaleX(0.9);
      }

      50% {
        opacity: 0.9;
        transform: translateY(-50%) scaleX(1.05);
      }
    }

    .flare-orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(244, 201, 106, 0.4) 40%,
          transparent 70%);
      filter: blur(3px);
    }

    .flare-orb.main {
      width: 120px;
      height: 120px;
      top: 42%;
      left: 38%;
      animation: orbFloat 7s ease-in-out infinite;
    }

    .flare-orb.secondary {
      width: 40px;
      height: 40px;
      top: 55%;
      left: 52%;
      animation: orbFloat 5s ease-in-out infinite reverse;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.6;
      }

      50% {
        transform: translate(15px, -10px) scale(1.1);
        opacity: 0.9;
      }
    }

    /* ═══════════════════════════════════════════
           LAUNCH COMPLETE TRANSITION
           ═══════════════════════════════════════════ */

    body.launch-complete .projector-unit {
      animation: projectorExit 0.8s ease-in forwards;
    }

    @keyframes projectorExit {
      to {
        opacity: 0;
        transform: translateY(-50%) translateX(-50px);
      }
    }

    body.launch-complete .light-beam-container {
      animation: beamCollapse 0.8s ease-in forwards;
    }

    @keyframes beamCollapse {
      to {
        opacity: 0;
        clip-path: polygon(0 50%, 0 50%, 0 50%, 0 50%);
      }
    }

    body.launch-complete .film-reel-system {
      animation: reelsExit 0.6s ease-in forwards;
    }

    @keyframes reelsExit {
      to {
        opacity: 0;
        transform: translateY(-50%) scale(0.9) translateX(30px);
      }
    }

    body.launch-complete .logo-container {
      animation: logoLaunch 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes logoLaunch {
      0% {
        opacity: 1;
        transform: translate(-60%, -50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-60%, -50%) scale(1.1);
        filter: blur(10px);
      }
    }

    body.launch-complete .flare-system {
      animation: flareDissipate 0.6s ease-out forwards;
    }

    @keyframes flareDissipate {
      to {
        opacity: 0;
      }
    }

    body.launch-complete {
      animation: screenFlash 0.3s ease-out 0.4s forwards;
    }

    @keyframes screenFlash {
      0% {
        background: var(--bg-deep);
      }

      50% {
        background: rgba(255, 255, 255, 0.95);
      }

      100% {
        background: var(--bg-deep);
      }
    }

    /* ═══════════════════════════════════════════
           RESPONSIVE & ACCESSIBILITY
           ═══════════════════════════════════════════ */

    @media (max-width: 1024px) {
      .projector-unit {
        left: 15px;
        transform: translateY(-50%) scale(0.85);
      }

      .projector-unit {
        animation-name: projectorSlideInResponsive;
      }

      @keyframes projectorSlideInResponsive {
        0% {
          opacity: 0;
          transform: translateY(-50%) scale(0.85) translateX(-80px);
        }

        100% {
          opacity: 1;
          transform: translateY(-50%) scale(0.85) translateX(0);
        }
      }

      .light-beam-container {
        left: 135px;
        width: calc(100vw - 170px);
      }

      .film-reel-system {
        right: 40px;
        gap: 200px;
      }

      .film-reel {
        width: 120px;
        height: 120px;
      }

      .logo-container {
        transform: translate(-55%, -50%);
      }

      .logo-card {
        padding: 35px 45px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Serif+Sinhala:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- LAYER 1: Atmospheric Background -->
  <div class="atmosphere">
    <div class="ambient-glow"></div>
    <div class="vignette-overlay"></div>
    <div class="film-grain"></div>
  </div>

  <!-- Particle Canvas for Dust in Light Beam -->
  <canvas id="particleCanvas"></canvas>

  <!-- LAYER 2: Projector Hardware Unit -->
  <div class="projector-unit">
    <div class="projector-body">
      <div class="lens-housing">
        <div class="lens-ring"></div>
        <div class="lens-ring"></div>
        <div class="lens-core"></div>
      </div>
      <div class="vent-slots">
        <div class="vent-slot"></div>
        <div class="vent-slot"></div>
        <div class="vent-slot"></div>
        <div class="vent-slot"></div>
      </div>
      <div class="power-led"></div>
    </div>
  </div>

  <!-- LAYER 3: Volumetric Light Beam -->
  <div class="light-beam-container">
    <div class="volumetric-beam"></div>
    <div class="beam-core"></div>
    <div class="beam-rays"></div>
  </div>

  <!-- LAYER 5: Dual Film Reel System -->
  <div class="film-reel-system">
    <div class="reel-assembly">
      <div class="film-reel reel-top">
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-hub">
          <div class="hub-center"></div>
        </div>
      </div>
    </div>

    <div class="film-strip-vertical"></div>

    <div class="reel-assembly">
      <div class="film-reel reel-bottom">
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-spoke"></div>
        <div class="reel-hub">
          <div class="hub-center"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYER 8: Lens Flare Effects -->
  <div class="flare-system">
    <div class="anamorphic-flare"></div>
    <div class="flare-orb main"></div>
    <div class="flare-orb secondary"></div>
  </div>

  <!-- LAYER 6: Logo Container with Glass Card -->
  <div class="logo-container">
    <div class="logo-card">
      <!-- Animated Title with Letter Reveal -->
      <h1 class="main-title" id="mainTitle">
        <span class="title-letter">C</span>
        <span class="title-letter">H</span>
        <span class="title-letter">I</span>
        <span class="title-letter">T</span>
        <span class="title-letter">H</span>
        <span class="title-letter">R</span>
        <span class="title-letter">A</span>
      </h1>

      <!-- Sinhala Subtitle -->
      <p class="subtitle-line">චිත්‍ර සිනමාව</p>

      <!-- Ornamental Divider -->
      <div class="ornament-divider">
        <span class="ornament-line"></span>
        <span class="ornament-diamond"></span>
        <span class="ornament-line"></span>
      </div>

      <!-- LAYER 7: Circular Progress Ring -->
      <div class="progress-section">
        <div class="progress-ring-container">
          <svg class="progress-ring-svg" viewBox="0 0 120 120">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#8B5CF6" />
                <stop offset="50%" style="stop-color:#F4C96A" />
                <stop offset="100%" style="stop-color:#FFD976" />
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="60" cy="60" r="54" />
            <circle class="ring-glow" cx="60" cy="60" r="54" id="ringGlow" />
            <circle class="ring-progress" cx="60" cy="60" r="54" id="ringProgress" />
          </svg>
          <div class="percentage-display">
            <span class="percent-value" id="percentValue">0<span class="percent-symbol">%</span></span>
          </div>
        </div>

        <!-- Dynamic Status Message -->
        <p class="status-message" id="statusMessage">Initializing Cinema Engine...</p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ============================================
      // DUST PARTICLE ENGINE FOR LIGHT BEAM
      // ============================================

      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let width, height;

      function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      class DustParticle {
        constructor() {
          this.reset();
          // Start particles distributed throughout beam area
          this.x = 180 + Math.random() * (width * 0.65);
          this.y = (height * 0.5) + (Math.random() - 0.5) * 180;
        }

        reset() {
          // Particles originate near projector lens
          this.x = 170 + Math.random() * 50;
          this.y = (height * 0.5) + (Math.random() - 0.5) * 60;
          this.size = Math.random() * 2.2 + 0.4;

          // Velocity - primarily moving right with slight drift
          this.vx = Math.random() * 2.5 + 0.8;
          this.vy = (Math.random() - 0.5) * 0.4;

          // Visual properties
          this.alpha = Math.random() * 0.7 + 0.2;
          this.fadeRate = Math.random() * 0.003 + 0.001;

          // Color variation (golden to warm white)
          const colorRand = Math.random();
          if (colorRand < 0.6) {
            this.color = `rgba(255, 217, 118, ${this.alpha})`;
          } else if (colorRand < 0.85) {
            this.color = `rgba(244, 201, 106, ${this.alpha})`;
          } else {
            this.color = `rgba(255, 255, 255, ${this.alpha})`;
          }
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          // Gentle floating motion
          this.vy += (Math.random() - 0.5) * 0.02;

          // Fade out as particle travels
          this.alpha -= this.fadeRate;

          // Reset if out of bounds or faded
          if (this.x > width - 100 || this.alpha <= 0 ||
            this.y < height * 0.3 || this.y > height * 0.7) {
            this.reset();
          }
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 217, 118, ${this.alpha})`;
          ctx.fill();

          // Subtle glow for larger particles
          if (this.size > 1.5) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 217, 118, ${this.alpha * 0.15})`;
            ctx.fill();
          }
        }
      }

      // Initialize particle system
      function initParticles() {
        particles = [];
        const particleCount = Math.min(150, Math.floor(width / 10));
        for (let i = 0; i < particleCount; i++) {
          particles.push(new DustParticle());
        }
      }

      initParticles();

      // Animation loop for particles
      function animateParticles() {
        ctx.clearRect(0, 0, width, height);

        for (const particle of particles) {
          particle.update();
          particle.draw();
        }

        requestAnimationFrame(animateParticles);
      }

      animateParticles();

      // ============================================
      // PROGRESS RING & BOOT SEQUENCER
      // ============================================

      const ringProgress = document.getElementById('ringProgress');
      const ringGlow = document.getElementById('ringGlow');
      const percentValue = document.getElementById('percentValue');
      const statusMessage = document.getElementById('statusMessage');
      const mainTitle = document.getElementById('mainTitle');

      // Circumference of circle (r=54): 2 * π * 54 ≈ 339.292
      const circumference = 339.292;

      // Startup stages with realistic messages
      const bootStages = [
        'Initializing Cinema Engine...',
        'Loading User Preferences...',
        'Connecting to Services...',
        'Loading Movie Library...',
        'Preparing Watch History...',
        'Syncing Cloud Data...',
        'Building Recommendations...',
        'Optimizing Experience...',
        'Finalizing Setup...',
        'Ready to Launch'
      ];

      let currentProgress = 0;
      let stageIndex = 0;

      function updateProgress(percent, message) {
        // Update ring
        const offset = circumference - (percent / 100) * circumference;
        ringProgress.style.strokeDashoffset = offset;
        ringGlow.style.strokeDashoffset = offset;

        // Update percentage display
        percentValue.innerHTML = `${percent}<span class="percent-symbol">%</span>`;

        // Update status message with fade effect
        if (message && message !== statusMessage.textContent) {
          statusMessage.style.opacity = 0;
          setTimeout(() => {
            statusMessage.textContent = message;
            statusMessage.style.opacity = 1;
          }, 150);
        }
      }

      function runBootSequence() {
        const interval = setInterval(() => {
          // Organic progress increment (varies like real loading)
          const increment = Math.floor(Math.random() * 4) + 1;
          currentProgress = Math.min(currentProgress + increment, 100);

          // Determine current stage
          const newStageIndex = Math.min(
            Math.floor((currentProgress / 100) * bootStages.length),
            bootStages.length - 1
          );

          if (newStageIndex !== stageIndex) {
            stageIndex = newStageIndex;
          }

          updateProgress(currentProgress, bootStages[stageIndex]);

          // Mark title as fully revealed when past 50%
          if (currentProgress >= 50 && !mainTitle.classList.contains('revealed')) {
            mainTitle.classList.add('revealed');
          }

          // Complete boot sequence
          if (currentProgress >= 100) {
            clearInterval(interval);

            // Brief pause then trigger launch
            setTimeout(() => {
              triggerLaunchComplete();
            }, 800);
          }
        }, 100);
      }

      function triggerLaunchComplete() {
        // Add launch complete class for exit animations
        document.body.classList.add('launch-complete');

        // Emit event for Electron/main app integration
        if (window.electronAPI && window.electronAPI.onBootComplete) {
          window.electronAPI.onBootComplete();
        }

        // Custom event for other listeners
        window.dispatchEvent(new CustomEvent('chithraBootComplete'));

        console.log('✦ CHITHRA CINEMA — Boot Sequence Complete');
      }

      // Start boot sequence after initial animations
      setTimeout(() => {
        runBootSequence();
      }, 3200);

      // ============================================
      // ELECTRON INTEGRATION HOOKS
      // ============================================

      // Expose API for external progress control
      window.chithraSplash = {
        setProgress: function (percent, message) {
          currentProgress = Math.min(Math.max(percent, 0), 100);
          updateProgress(currentProgress, message || bootStages[stageIndex]);
        },

        complete: function () {
          currentProgress = 100;
          updateProgress(100, bootStages[bootStages.length - 1]);
          setTimeout(triggerLaunchComplete, 500);
        },

        getStatus: function () {
          return {
            progress: currentProgress,
            stage: bootStages[stageIndex],
            isComplete: currentProgress >= 100
          };
        }
      };

      // Listen for external progress events (from Electron main process)
      if (window.electronAPI && window.electronAPI.onLoadingProgress) {
        window.electronAPI.onLoadingProgress((percent, message) => {
          window.chithraSplash.setProgress(percent, message);
        });
      }

      // ============================================
      // SUBTLE PARALLAX ON MOUSE MOVE
      // ============================================

      let parallaxEnabled = true;

      document.addEventListener('mousemove', (e) => {
        if (!parallaxEnabled) return;

        const mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        const mouseY = (e.clientY / window.innerHeight - 0.5) * 2;

        // Subtle parallax on logo container
        const logoContainer = document.querySelector('.logo-container');
        if (logoContainer) {
          const offsetX = mouseX * 8;
          const offsetY = mouseY * 5;
          logoContainer.style.transform = `translate(calc(-60% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
        }

        // Parallax on flare orbs
        const flareOrbs = document.querySelectorAll('.flare-orb');
        flareOrbs.forEach((orb, index) => {
          const factor = (index + 1) * 12;
          orb.style.transform = `translate(${mouseX * factor}px, ${mouseY * factor}px)`;
        });
      });

      document.addEventListener('mouseleave', () => {
        const logoContainer = document.querySelector('.logo-container');
        if (logoContainer) {
          logoContainer.style.transform = 'translate(-60%, -50%)';
        }

        const flareOrbs = document.querySelectorAll('.flare-orb');
        flareOrbs.forEach(orb => {
          orb.style.transform = 'translate(0, 0)';
        });
      });

      // Log initialization
      console.log('%c✦ CHITHRA CINEMA — Hollywood Projector Edition',
        'color: #F4C96A; font-size: 16px; font-weight: bold; text-shadow: 0 0 10px rgba(244, 201, 106, 0.5);');
      console.log('%cSplash Screen Initialized',
        'color: #B794F4; font-size: 12px;');

    })();
  </script>

</body>

</html>
