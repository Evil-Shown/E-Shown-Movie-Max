<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHITHRA — CINEMA</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(245, 158, 11, 0.16), transparent 24%),
          radial-gradient(circle at top, #1a1424 0%, #0a0a0f 55%, #050508 100%);
        color: #f9fafb;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }
      .wrap {
        text-align: center;
        padding: 2.5rem 2.25rem 2.25rem;
        position: relative;
      }
      .logo {
        font-size: 3.25rem;
        margin-bottom: 1rem;
        animation: pulse 2.8s ease-in-out infinite, float 5.5s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.18));
      }
      h1 {
        font-size: 1.3rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        font-weight: 600;
        background: linear-gradient(90deg, #f59e0b, #fbbf24 28%, #7c3aed 72%, #f59e0b);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 30px rgba(245, 158, 11, 0.12);
      }
      p {
        margin-top: 1rem;
        color: #9ca3af;
        font-size: 0.95rem;
      }
      .bar {
        width: 260px;
        height: 5px;
        margin: 1.5rem auto 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bar span {
        display: block;
        height: 100%;
        width: 35%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7c3aed, #f59e0b);
        animation: slide 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }
      @keyframes slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">🎬</div>
      <h1>CHITHRA — CINEMA</h1>
      <p id="status">චිත්‍ර — Cinema · Loading...</p>
      <div class="bar"><span></span></div>
    </div>
  </body>
</html>
