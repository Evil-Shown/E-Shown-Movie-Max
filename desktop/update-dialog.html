<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
  <title>CHITHRA — Update</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #040408;
      font-family: "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-app-region: no-drag;
    }

    body.preview-mode {
      background: radial-gradient(circle at top, #1a1424 0%, #0a0a0f 55%, #050508 100%);
    }

    .preview-toolbar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 10, 16, 0.92);
      backdrop-filter: blur(8px);
    }

    .preview-toolbar button {
      padding: 8px 14px;
      font-size: 0.8rem;
    }

    .backdrop {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(4, 4, 8, 0.72);
    }

    .card {
      width: 100%;
      max-width: 460px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(165deg, #17131f 0%, #0d0b12 48%, #09080d 100%);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      color: #f3f4f6;
    }

    .hero {
      position: relative;
      padding: 28px 28px 22px;
      background:
        radial-gradient(circle at 12% 20%, rgba(124, 58, 237, 0.22), transparent 42%),
        radial-gradient(circle at 88% 0%, rgba(245, 158, 11, 0.16), transparent 36%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(168, 212, 224, 0.35);
      background: rgba(74, 124, 142, 0.14);
      color: #a8d4e0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7dd3fc;
      box-shadow: 0 0 10px rgba(125, 211, 252, 0.8);
    }

    h1 {
      margin-top: 14px;
      font-size: 1.55rem;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin-top: 8px;
      color: #b6bcc8;
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .versions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .version-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.82rem;
      color: #d1d5db;
    }

    .version-pill strong {
      color: #f9fafb;
      font-weight: 650;
    }

    .version-pill.next {
      border-color: rgba(245, 158, 11, 0.35);
      background: rgba(245, 158, 11, 0.1);
    }

    .body {
      padding: 22px 28px 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8b93a3;
      margin-bottom: 10px;
    }

    .notes {
      max-height: 220px;
      overflow: auto;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(0, 0, 0, 0.22);
      color: #d4d8e0;
      font-size: 0.92rem;
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
    }

    .notes.empty {
      color: #9ca3af;
      font-style: italic;
    }

    .notes p,
    .notes ul {
      margin-bottom: 10px;
    }

    .notes p:last-child,
    .notes ul:last-child {
      margin-bottom: 0;
    }

    .notes ul {
      padding-left: 1.1rem;
    }

    .notes li {
      margin-bottom: 6px;
    }

    .notes .note-heading {
      margin: 4px 0 8px;
      color: #f3f4f6;
      font-size: 0.98rem;
      font-weight: 650;
    }

    .notes code {
      padding: 1px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #f4c27a;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.86em;
    }

    .notes a {
      color: #a8d4e0;
      text-decoration: none;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 28px 24px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 1;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      color: #d1d5db;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      color: #111827;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      box-shadow: 0 10px 24px rgba(245, 158, 11, 0.25);
    }
  </style>
</head>

<body>
  <div class="preview-toolbar" id="preview-toolbar" hidden>
    <button type="button" class="btn-secondary" id="preview-available">Update available</button>
    <button type="button" class="btn-secondary" id="preview-ready">Update ready</button>
  </div>

  <div class="backdrop">
    <div class="card" role="dialog" aria-modal="true" aria-labelledby="update-title">
      <div class="hero">
        <div class="badge" id="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          <span id="badge-text">Update</span>
        </div>
        <h1 id="update-title">A new version is ready</h1>
        <p class="subtitle" id="subtitle">Download the latest CHITHRA — CINEMA build.</p>
        <div class="versions" id="versions"></div>
      </div>

      <div class="body" id="notes-section">
        <p class="section-label">What&apos;s new</p>
        <div class="notes" id="notes"></div>
      </div>

      <div class="footer">
        <button type="button" class="btn-secondary" id="btn-secondary">Not now</button>
        <button type="button" class="btn-primary" id="btn-primary">Download update</button>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById("update-title");
    const subtitleEl = document.getElementById("subtitle");
    const badgeTextEl = document.getElementById("badge-text");
    const versionsEl = document.getElementById("versions");
    const notesSectionEl = document.getElementById("notes-section");
    const notesEl = document.getElementById("notes");
    const btnSecondary = document.getElementById("btn-secondary");
    const btnPrimary = document.getElementById("btn-primary");

    function formatVersion(version) {
      return version ? `v${version}` : "Latest";
    }

    function renderVersions(currentVersion, nextVersion) {
      versionsEl.innerHTML = "";

      if (currentVersion) {
        const current = document.createElement("div");
        current.className = "version-pill";
        current.innerHTML = `Installed <strong>${formatVersion(currentVersion)}</strong>`;
        versionsEl.appendChild(current);
      }

      if (nextVersion) {
        const next = document.createElement("div");
        next.className = "version-pill next";
        next.innerHTML = `Available <strong>${formatVersion(nextVersion)}</strong>`;
        versionsEl.appendChild(next);
      }
    }

    function render(payload) {
      const kind = payload.kind || "available";

      if (kind === "ready") {
        badgeTextEl.textContent = "Ready to install";
        titleEl.textContent = `${formatVersion(payload.nextVersion)} is downloaded`;
        subtitleEl.textContent = "Restart CHITHRA — CINEMA to finish installing this update.";
        notesSectionEl.style.display = "none";
        btnPrimary.textContent = "Restart now";
        btnSecondary.textContent = "Later";
        renderVersions(payload.currentVersion, payload.nextVersion);
        return;
      }

      badgeTextEl.textContent = "Update available";
      titleEl.textContent = `${formatVersion(payload.nextVersion)} is available`;
      subtitleEl.textContent = "Stay on the latest build for fixes, performance, and new features.";
      btnPrimary.textContent = "Download update";
      btnSecondary.textContent = "Not now";
      renderVersions(payload.currentVersion, payload.nextVersion);

      if (payload.notesHtml) {
        notesEl.innerHTML = payload.notesHtml;
        notesEl.classList.remove("empty");
      } else {
        notesEl.textContent = "This release includes improvements and bug fixes.";
        notesEl.classList.add("empty");
      }
    }

    btnSecondary.addEventListener("click", () => {
      window.updateDialog.respond("secondary");
    });

    btnPrimary.addEventListener("click", () => {
      window.updateDialog.respond("primary");
    });


    // Release Notes add Here

    const previewSamples = {
      available: {
        kind: "available",
        currentVersion: "2.1.2",
        nextVersion: "2.2.0",
        notesHtml:
          '<h3 class="note-heading">What&apos;s new in v2.2.0</h3>' +
          "<ul>" +
          "<li><strong>Live TV</strong> — Sri Lankan channels with rewind support</li>" +
          "<li>Improved stream reliability and faster channel switching</li>" +
          "<li>Bug fixes for the desktop player and startup splash</li>" +
          "</ul>" +
          "<p>Thank you for using <code>CHITHRA — CINEMA</code>.</p>",
      },
      ready: {
        kind: "ready",
        currentVersion: "2.1.2",
        nextVersion: "2.2.0",
      },
    };

    if (window.updateDialog) {
      window.updateDialog.onInit(render);
    } else {
      document.body.classList.add("preview-mode");
      const toolbar = document.getElementById("preview-toolbar");
      toolbar.hidden = false;
      render(previewSamples.available);
      document.getElementById("preview-available").addEventListener("click", () => {
        render(previewSamples.available);
      });
      document.getElementById("preview-ready").addEventListener("click", () => {
        render(previewSamples.ready);
      });
    }
  </script>
</body>

</html>
