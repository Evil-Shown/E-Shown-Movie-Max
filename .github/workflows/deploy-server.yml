name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "packages/core/**"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "packages/core/**"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check server
        working-directory: server
        run: npm run lint

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build Docker image
        run: docker build -t chithra-cinema-api:${{ github.sha }} .

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build Docker image
        run: docker build -t chithra-cinema-api:${{ github.sha }} .

      - name: Trigger Render deploy
        run: |
          echo "Deploy ready — Render auto-deploys from main branch."
          echo "Alternatively, configure a Render Deploy Hook URL in secrets."
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          fi
