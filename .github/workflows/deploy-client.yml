name: Deploy Client (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check client
        working-directory: client
        run: npx next lint --no-cache
        continue-on-error: true

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://chithra-cinema-api.koyeb.app' }}
          NEXT_PUBLIC_GODS_EYE_API_URL: ${{ vars.NEXT_PUBLIC_GODS_EYE_API_URL || 'https://chithra-cinema-api.koyeb.app' }}
          NEXT_PUBLIC_TBOOM_API_URL: ${{ vars.NEXT_PUBLIC_TBOOM_API_URL || 'https://chithra-cinema-api.koyeb.app' }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || 'CHITHRA — CINEMA' }}
          NEXT_PUBLIC_USE_EMBED_PROXY: ${{ vars.NEXT_PUBLIC_USE_EMBED_PROXY || 'false' }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
