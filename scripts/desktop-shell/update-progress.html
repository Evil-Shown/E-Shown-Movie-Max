<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>CHITHRA — Downloading Update</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #040408;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-app-region: drag;
      }

      .backdrop {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        position: relative;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
          linear-gradient(180deg, #0a0a14 0%, #06060c 100%);
      }

      .card {
        width: 100%;
        max-width: 420px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(175deg,
          rgba(25, 22, 35, 0.95) 0%,
          rgba(15, 13, 22, 0.98) 40%,
          rgba(10, 9, 16, 1) 100%);
        box-shadow:
          0 32px 96px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        padding: 36px 32px 32px;
        text-align: center;
        position: relative;
        overflow: hidden;
        -webkit-app-region: no-drag;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.04) 50%,
          transparent 100%);
        animation: shimmer 3s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(0); }
        100% { transform: translateX(200%); }
      }

      .spinner-ring {
        width: 90px;
        height: 90px;
        margin: 0 auto 24px;
        position: relative;
      }

      .spinner-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .spinner-track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 6;
      }

      .spinner-progress {
        fill: none;
        stroke: url(#spinnerGradient);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-dasharray: 251.327;
        stroke-dashoffset: 251.327;
        transition: stroke-dashoffset 0.3s ease;
        filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.5));
      }

      .spinner-glow {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle,
          rgba(245, 158, 11, 0.15) 0%,
          transparent 70%);
        animation: pulseGlow 2s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      .rotating-ring {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: rgba(245, 158, 11, 0.4);
        border-right-color: rgba(124, 58, 237, 0.3);
        animation: rotate 1.5s linear infinite;
      }

      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      h1 {
        font-size: 1.35rem;
        font-weight: 700;
        color: #f3f4f6;
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }

      .version {
        color: #fbbf24;
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .progress-container {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        height: 10px;
        overflow: hidden;
        margin-bottom: 12px;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 12px;
        background: linear-gradient(90deg, #8b5cf6 0%, #f59e0b 50%, #fbbf24 100%);
        background-size: 200% 100%;
        transition: width 0.3s ease;
        box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
        animation: gradientMove 2s linear infinite;
      }

      @keyframes gradientMove {
        0% { background-position: 0% 0%; }
        100% { background-position: 200% 0%; }
      }

      .stats {
        display: flex;
        justify-content: space-between;
        color: #9ca3af;
        font-size: 0.85rem;
        margin-bottom: 20px;
      }

      .percent {
        color: #fbbf24;
        font-weight: 700;
      }

      .message {
        color: #d1d5db;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .message strong {
        color: #f3f4f6;
      }

      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        animation: float 12s infinite;
        opacity: 0;
      }

      @keyframes float {
        0% { transform: translateY(110%) translateX(0); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translateY(-20%) translateX(40px); opacity: 0; }
      }

      .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 10s; }
      .particle:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 13s; }
      .particle:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 11s; }
      .particle:nth-child(4) { left: 55%; animation-delay: 1s; animation-duration: 14s; }
      .particle:nth-child(5) { left: 70%; animation-delay: 3s; animation-duration: 12s; }
      .particle:nth-child(6) { left: 85%; animation-delay: 5s; animation-duration: 15s; }
    </style>
  </head>
  <body>
    <div class="backdrop">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>

      <div class="card">
        <div class="spinner-ring">
          <div class="spinner-glow"></div>
          <div class="rotating-ring"></div>
          <svg viewBox="0 0 90 90">
            <defs>
              <linearGradient id="spinnerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#8B5CF6"/>
                <stop offset="50%" style="stop-color:#F4C96A"/>
                <stop offset="100%" style="stop-color:#FFD976"/>
              </linearGradient>
            </defs>
            <circle class="spinner-track" cx="45" cy="45" r="40"/>
            <circle class="spinner-progress" cx="45" cy="45" r="40" id="spinnerProgress"/>
          </svg>
        </div>

        <h1>Downloading update</h1>
        <div class="version" id="versionText">v?.?.?</div>

        <div class="progress-container">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
          <span id="bytesText">0 MB / 0 MB</span>
          <span class="percent" id="percentText">0%</span>
        </div>

        <p class="message">
          Please keep the app open. The update will be installed automatically once the download finishes.
        </p>
      </div>
    </div>

    <script>
      const spinnerProgress = document.getElementById('spinnerProgress');
      const progressFill = document.getElementById('progressFill');
      const percentText = document.getElementById('percentText');
      const bytesText = document.getElementById('bytesText');
      const versionText = document.getElementById('versionText');

      const circumference = 2 * Math.PI * 40;
      spinnerProgress.style.strokeDasharray = circumference;
      spinnerProgress.style.strokeDashoffset = circumference;

      function formatBytes(bytes) {
        if (bytes === 0 || isNaN(bytes)) return '0 MB';
        const mb = bytes / (1024 * 1024);
        if (mb < 1024) return mb.toFixed(1) + ' MB';
        return (mb / 1024).toFixed(2) + ' GB';
      }

      function setProgress(percent, transferred, total) {
        const p = Math.max(0, Math.min(100, percent || 0));
        const offset = circumference - (p / 100) * circumference;
        spinnerProgress.style.strokeDashoffset = offset;
        progressFill.style.width = p + '%';
        percentText.textContent = Math.round(p) + '%';
        bytesText.textContent = formatBytes(transferred) + ' / ' + formatBytes(total);
      }

      function setVersion(version) {
        versionText.textContent = version ? 'v' + version : 'Latest version';
      }

      if (window.updateProgress) {
        window.updateProgress.onInit((payload) => {
          setVersion(payload.version);
          setProgress(payload.percent, payload.transferred, payload.total);
        });
      }
    </script>
  </body>
</html>
