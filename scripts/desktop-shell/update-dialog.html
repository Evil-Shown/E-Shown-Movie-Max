<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>CHITHRA — Update</title>
    <style>
      :root {
        --gold-primary: #f4c96a;
        --gold-bright: #ffd976;
        --gold-warm: #e5a83e;
        --gold-glow: rgba(244, 201, 106, 0.4);
        --bg-deep: #0a0a0f;
        --bg-card: rgba(14, 12, 20, 0.96);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-medium: rgba(255, 255, 255, 0.1);
        --radius-lg: 24px;
        --radius-md: 14px;
        --radius-sm: 10px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-deep);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: no-drag;
      }

      /* Cinema background with light beam */
      body.preview-mode {
        background:
          radial-gradient(ellipse 120% 80% at 50% 0%, rgba(244, 201, 106, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(229, 168, 62, 0.05) 0%, transparent 50%),
          linear-gradient(180deg, #0c0a14 0%, #08080e 50%, #040408 100%);
        animation: bgBreathe 6s ease-in-out infinite alternate;
      }

      @keyframes bgBreathe {
        0% { opacity: 0.85; }
        100% { opacity: 1; }
      }

      .backdrop {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
      }

      .card {
        width: 100%;
        max-width: 500px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(244, 201, 106, 0.12);
        background: var(--bg-card);
        backdrop-filter: blur(40px);
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(244, 201, 106, 0.04) inset,
          0 1px 0 rgba(255, 255, 255, 0.04) inset;
        overflow: hidden;
        color: var(--text-primary);
        position: relative;
        animation: cardEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center center;
      }

      @keyframes cardEntrance {
        from { opacity: 0; transform: scale(0.92) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* Golden beam glow at top of card */
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 15%;
        width: 70%;
        height: 260px;
        background: radial-gradient(ellipse 100% 50% at 50% 0%, rgba(244, 201, 106, 0.1), transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Subtle top gold line */
      .card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 25%;
        right: 25%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(244, 201, 106, 0.4), transparent);
        pointer-events: none;
        z-index: 2;
      }

      .hero {
        position: relative;
        padding: 36px 32px 28px;
        border-bottom: 1px solid rgba(244, 201, 106, 0.08);
        z-index: 1;
      }

      .close-btn {
        position: absolute;
        top: 18px;
        right: 18px;
        width: 34px;
        height: 34px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-medium);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-secondary);
        font-size: 1.25rem;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        -webkit-app-region: no-drag;
      }

      .close-btn:hover {
        background: rgba(244, 201, 106, 0.1);
        border-color: rgba(244, 201, 106, 0.3);
        color: var(--gold-bright);
        transform: scale(1.05);
      }

      /* Badge — gold theme */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        border-radius: 999px;
        border: 1px solid rgba(244, 201, 106, 0.3);
        background: rgba(244, 201, 106, 0.08);
        color: var(--gold-bright);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        animation: badgePulse 2s ease-in-out infinite alternate;
      }

      @keyframes badgePulse {
        from { box-shadow: 0 0 16px var(--gold-glow); }
        to { box-shadow: 0 0 24px rgba(244, 201, 106, 0.55); }
      }

      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold-bright);
        box-shadow: 0 0 10px var(--gold-glow);
        animation: dotPulse 1.5s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.25); opacity: 0.7; }
      }

      /* Title with gold gradient */
      h1 {
        margin-top: 20px;
        font-size: 1.7rem;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, #ffffff 0%, var(--gold-bright) 50%, var(--gold-primary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--text-secondary);
        font-size: 0.96rem;
        line-height: 1.55;
      }

      .versions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .version-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 15px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        background: rgba(255, 255, 255, 0.03);
        font-size: 0.85rem;
        color: #d1d5db;
        transition: all 0.25s ease;
      }

      .version-pill strong {
        color: var(--text-primary);
        font-weight: 650;
      }

      .version-pill.next {
        border-color: rgba(244, 201, 106, 0.3);
        background: linear-gradient(135deg, rgba(244, 201, 106, 0.1) 0%, rgba(229, 168, 62, 0.06) 100%);
        box-shadow: 0 0 20px rgba(244, 201, 106, 0.12);
      }

      .body {
        padding: 26px 32px 16px;
        position: relative;
        z-index: 1;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(244, 201, 106, 0.15), transparent);
      }

      .notes {
        max-height: 220px;
        overflow-y: auto;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid var(--border-subtle);
        background: rgba(0, 0, 0, 0.22);
        color: #d4d8e0;
        font-size: 0.92rem;
        line-height: 1.6;
        scrollbar-width: thin;
        scrollbar-color: rgba(244, 201, 106, 0.2) transparent;
        transition: all 0.3s ease;
      }

      .notes:hover {
        border-color: rgba(244, 201, 106, 0.12);
      }

      .notes::-webkit-scrollbar { width: 5px; }
      .notes::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
      .notes::-webkit-scrollbar-thumb {
        background: rgba(244, 201, 106, 0.2);
        border-radius: 3px;
      }
      .notes::-webkit-scrollbar-thumb:hover { background: rgba(244, 201, 106, 0.35); }

      .notes.empty {
        color: var(--text-secondary);
        font-style: italic;
        text-align: center;
        padding: 24px 20px;
      }

      .notes p, .notes ul { margin-bottom: 10px; }
      .notes p:last-child, .notes ul:last-child { margin-bottom: 0; }
      .notes ul { padding-left: 1.2rem; }
      .notes li { margin-bottom: 6px; }
      .notes li::marker { color: var(--gold-primary); }

      .notes .note-heading {
        margin: 4px 0 10px;
        color: var(--text-primary);
        font-size: 1rem;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .notes code {
        padding: 2px 7px;
        border-radius: 6px;
        background: rgba(244, 201, 106, 0.12);
        color: var(--gold-bright);
        font-family: "SF Mono", Consolas, "Courier New", monospace;
        font-size: 0.86em;
        border: 1px solid rgba(244, 201, 106, 0.15);
      }

      .notes a {
        color: var(--gold-bright);
        text-decoration: none;
        transition: all 0.2s ease;
        border-bottom: 1px solid transparent;
      }

      .notes a:hover {
        color: var(--gold-primary);
        border-bottom-color: var(--gold-primary);
      }

      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 20px 32px 30px;
        position: relative;
        z-index: 1;
      }

      button {
        border: none;
        border-radius: var(--radius-md);
        padding: 13px 24px;
        font-size: 0.94rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-app-region: no-drag;
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
        transition: left 0.5s ease;
      }

      button:hover::before { left: 100%; }
      button:hover { transform: translateY(-2px); }
      button:active { transform: translateY(0) scale(0.98); }

      .btn-secondary {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-medium);
        backdrop-filter: blur(10px);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(244, 201, 106, 0.2);
        color: #ffffff;
      }

      .btn-primary {
        color: #0d0b12;
        background: linear-gradient(135deg, var(--gold-warm) 0%, var(--gold-primary) 50%, var(--gold-bright) 100%);
        background-size: 200% 200%;
        box-shadow:
          0 8px 28px rgba(244, 201, 106, 0.3),
          0 0 0 1px rgba(244, 201, 106, 0.25) inset;
        animation: goldShift 4s ease infinite;
      }

      @keyframes goldShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .btn-primary:hover {
        box-shadow:
          0 14px 36px rgba(244, 201, 106, 0.4),
          0 0 0 1px rgba(244, 201, 106, 0.35) inset;
      }

      /* Floating gold dust particles */
      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(244, 201, 106, 0.4);
        border-radius: 50%;
        animation: floatUp 14s infinite;
        opacity: 0;
      }

      @keyframes floatUp {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        8% { opacity: 0.5; }
        92% { opacity: 0.5; }
        100% { transform: translateY(-20vh) rotate(540deg); opacity: 0; }
      }

      .particle:nth-child(1) { left: 8%; animation-delay: 0s; animation-duration: 16s; }
      .particle:nth-child(2) { left: 25%; animation-delay: 2.5s; animation-duration: 14s; }
      .particle:nth-child(3) { left: 42%; animation-delay: 5s; animation-duration: 18s; }
      .particle:nth-child(4) { left: 58%; animation-delay: 1.5s; animation-duration: 15s; }
      .particle:nth-child(5) { left: 72%; animation-delay: 3.5s; animation-duration: 17s; }
      .particle:nth-child(6) { left: 88%; animation-delay: 6s; animation-duration: 13s; }

      @media (max-width: 520px) {
        .card { border-radius: 20px; }
        .hero { padding: 28px 22px 22px; }
        h1 { font-size: 1.45rem; }
        .body, .footer { padding-left: 22px; padding-right: 22px; }
        .versions { flex-direction: column; }
        .footer { flex-direction: column-reverse; }
        .footer button { width: 100%; text-align: center; }
      }
    </style>
  </head>
  <body class="preview-mode">
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="backdrop">
      <div class="card" role="dialog" aria-modal="true" aria-labelledby="update-title">
        <div class="hero">
          <button type="button" class="close-btn" id="btn-close" aria-label="Close">&times;</button>
          <div class="badge" id="badge">
            <span class="badge-dot" aria-hidden="true"></span>
            <span id="badge-text">Update</span>
          </div>
          <h1 id="update-title">A new version is ready</h1>
          <p class="subtitle" id="subtitle">Download the latest CHITHRA — CINEMA build.</p>
          <div class="versions" id="versions"></div>
        </div>

        <div class="body" id="notes-section">
          <p class="section-label">What&apos;s new</p>
          <div class="notes" id="notes"></div>
        </div>

        <div class="footer">
          <button type="button" class="btn-secondary" id="btn-secondary">Not now</button>
          <button type="button" class="btn-primary" id="btn-primary">Download update</button>
        </div>
      </div>
    </div>

    <script src="update-dialog-renderer.js"></script>
  </body>
</html>
