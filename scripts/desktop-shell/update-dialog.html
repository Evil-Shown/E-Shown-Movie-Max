<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>CHITHRA — Update</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #040408;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: no-drag;
      }

      body.preview-mode {
        background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.12) 0%, transparent 45%),
                    radial-gradient(ellipse at 20% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                    linear-gradient(180deg, #0a0a14 0%, #06060c 50%, #030306 100%);
        animation: bgPulse 8s ease-in-out infinite alternate;
      }

      @keyframes bgPulse {
        0% { opacity: 0.9; }
        100% { opacity: 1; }
      }

      .backdrop {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
      }

      .card {
        width: 100%;
        max-width: 500px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(175deg, 
          rgba(25, 22, 35, 0.95) 0%, 
          rgba(15, 13, 22, 0.98) 40%,
          rgba(10, 9, 16, 1) 100%);
        backdrop-filter: blur(40px);
        box-shadow: 
          0 32px 96px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 1px 0 rgba(255, 255, 255, 0.05) inset;
        overflow: hidden;
        color: #f3f4f6;
        position: relative;
        animation: cardEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center center;
      }

      @keyframes cardEntrance {
        from {
          opacity: 0;
          transform: scale(0.92) translateY(30px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 300px;
        background: 
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124, 58, 237, 0.2), transparent 55%),
          radial-gradient(ellipse 70% 50% at 85% 5%, rgba(245, 158, 11, 0.15), transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      .hero {
        position: relative;
        padding: 36px 32px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 1;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(125, 211, 252, 0.3);
        background: rgba(56, 189, 248, 0.1);
        color: #7dd3fc;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        animation: badgeGlow 2s ease-in-out infinite alternate;
      }

      @keyframes badgeGlow {
        from {
          box-shadow: 0 0 12px rgba(125, 211, 252, 0.3);
        }
        to {
          box-shadow: 0 0 20px rgba(125, 211, 252, 0.5);
        }
      }

      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #7dd3fc;
        box-shadow: 0 0 12px rgba(125, 211, 252, 0.9);
        animation: dotPulse 1.5s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%, 100% { 
          transform: scale(1); 
          opacity: 1;
        }
        50% { 
          transform: scale(1.2); 
          opacity: 0.8;
        }
      }

      h1 {
        margin-top: 20px;
        font-size: 1.75rem;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        margin-top: 12px;
        color: #9ca3af;
        font-size: 1rem;
        line-height: 1.6;
      }

      .versions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      .version-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
        font-size: 0.88rem;
        color: #d1d5db;
        transition: all 0.25s ease;
      }

      .version-pill:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }

      .version-pill strong {
        color: #f9fafb;
        font-weight: 650;
      }

      .version-pill.next {
        border-color: rgba(245, 158, 11, 0.35);
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.12) 0%, rgba(251, 191, 36, 0.08) 100%);
        box-shadow: 0 4px 16px rgba(245, 158, 11, 0.15);
      }

      .body {
        padding: 26px 32px 16px;
        position: relative;
        z-index: 1;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
      }

      .notes {
        max-height: 240px;
        overflow-y: auto;
        padding: 18px 20px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(0, 0, 0, 0.25);
        color: #d4d8e0;
        font-size: 0.94rem;
        line-height: 1.65;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        transition: all 0.3s ease;
      }

      .notes:hover {
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.3);
      }

      .notes::-webkit-scrollbar {
        width: 6px;
      }

      .notes::-webkit-scrollbar-track {
        background: transparent;
        border-radius: 3px;
      }

      .notes::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }

      .notes::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .notes.empty {
        color: #9ca3af;
        font-style: italic;
        text-align: center;
        padding: 24px 20px;
      }

      .notes p,
      .notes ul {
        margin-bottom: 12px;
      }

      .notes p:last-child,
      .notes ul:last-child {
        margin-bottom: 0;
      }

      .notes ul {
        padding-left: 1.2rem;
      }

      .notes li {
        margin-bottom: 8px;
        position: relative;
      }

      .notes li::marker {
        color: #f59e0b;
      }

      .notes .note-heading {
        margin: 6px 0 12px;
        color: #f3f4f6;
        font-size: 1.04rem;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .notes code {
        padding: 3px 8px;
        border-radius: 6px;
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(251, 191, 36, 0.1) 100%);
        color: #fbbf24;
        font-family: "SF Mono", Consolas, "Courier New", monospace;
        font-size: 0.88em;
        border: 1px solid rgba(245, 158, 11, 0.2);
      }

      .notes a {
        color: #7dd3fc;
        text-decoration: none;
        transition: all 0.2s ease;
        border-bottom: 1px solid transparent;
      }

      .notes a:hover {
        color: #38bdf8;
        border-bottom-color: #38bdf8;
      }

      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 20px 32px 30px;
        position: relative;
        z-index: 1;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 13px 24px;
        font-size: 0.94rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-app-region: no-drag;
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
        transition: left 0.5s ease;
      }

      button:hover::before {
        left: 100%;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0) scale(0.98);
      }

      .btn-secondary {
        color: #d1d5db;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      .btn-primary {
        color: #111827;
        background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
        background-size: 200% 200%;
        box-shadow: 
          0 8px 24px rgba(245, 158, 11, 0.35),
          0 0 0 1px rgba(245, 158, 11, 0.3) inset;
        animation: gradientShift 3s ease infinite;
      }

      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .btn-primary:hover {
        box-shadow: 
          0 12px 32px rgba(245, 158, 11, 0.45),
          0 0 0 1px rgba(245, 158, 11, 0.4) inset;
      }

      /* Floating particles effect */
      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: float 15s infinite;
        opacity: 0;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100vh) rotate(720deg);
          opacity: 0;
        }
      }

      .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 18s; }
      .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 15s; }
      .particle:nth-child(3) { left: 35%; animation-delay: 4s; animation-duration: 20s; }
      .particle:nth-child(4) { left: 50%; animation-delay: 1s; animation-duration: 17s; }
      .particle:nth-child(5) { left: 65%; animation-delay: 3s; animation-duration: 19s; }
      .particle:nth-child(6) { left: 80%; animation-delay: 5s; animation-duration: 16s; }
      .particle:nth-child(7) { left: 90%; animation-delay: 2.5s; animation-duration: 21s; }

      /* Responsive adjustments */
      @media (max-width: 520px) {
        .card {
          border-radius: 24px;
        }
        
        .hero {
          padding: 28px 24px 24px;
        }
        
        h1 {
          font-size: 1.5rem;
        }
        
        .body, .footer {
          padding-left: 24px;
          padding-right: 24px;
        }
        
        .versions {
          flex-direction: column;
        }
        
        .footer {
          flex-direction: column-reverse;
        }
        
        .footer button {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body class="preview-mode">
    <!-- Floating particles -->
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="backdrop">
      <div class="card" role="dialog" aria-modal="true" aria-labelledby="update-title">
        <div class="hero">
          <div class="badge" id="badge">
            <span class="badge-dot" aria-hidden="true"></span>
            <span id="badge-text">Update</span>
          </div>
          <h1 id="update-title">A new version is ready</h1>
          <p class="subtitle" id="subtitle">Download the latest CHITHRA — CINEMA build.</p>
          <div class="versions" id="versions"></div>
        </div>

        <div class="body" id="notes-section">
          <p class="section-label">What&apos;s new</p>
          <div class="notes" id="notes"></div>
        </div>

        <div class="footer">
          <button type="button" class="btn-secondary" id="btn-secondary">Not now</button>
          <button type="button" class="btn-primary" id="btn-primary">Download update</button>
        </div>
      </div>
    </div>

    <script>
      const titleEl = document.getElementById("update-title");
      const subtitleEl = document.getElementById("subtitle");
      const badgeTextEl = document.getElementById("badge-text");
      const versionsEl = document.getElementById("versions");
      const notesSectionEl = document.getElementById("notes-section");
      const notesEl = document.getElementById("notes");
      const btnSecondary = document.getElementById("btn-secondary");
      const btnPrimary = document.getElementById("btn-primary");

      function formatVersion(version) {
        return version ? `v${version}` : "Latest";
      }

      function renderVersions(currentVersion, nextVersion) {
        versionsEl.innerHTML = "";

        if (currentVersion) {
          const current = document.createElement("div");
          current.className = "version-pill";
          current.innerHTML = `Installed <strong>${formatVersion(currentVersion)}</strong>`;
          versionsEl.appendChild(current);
        }

        if (nextVersion) {
          const next = document.createElement("div");
          next.className = "version-pill next";
          next.innerHTML = `Available <strong>${formatVersion(nextVersion)}</strong>`;
          versionsEl.appendChild(next);
        }
      }

      function render(payload) {
        const kind = payload.kind || "available";

        if (kind === "ready") {
          badgeTextEl.textContent = "Ready to install";
          titleEl.textContent = `${formatVersion(payload.nextVersion)} is downloaded`;
          subtitleEl.textContent = "Restart CHITHRA — CINEMA to finish installing this update.";
          notesSectionEl.style.display = "none";
          btnPrimary.textContent = "Restart now";
          btnSecondary.textContent = "Later";
          renderVersions(payload.currentVersion, payload.nextVersion);
          return;
        }

        if (kind === "uptodate") {
          badgeTextEl.textContent = "Up to date";
          titleEl.textContent = "You're on the latest version";
          subtitleEl.textContent = "CHITHRA — CINEMA will automatically check for updates on startup.";
          notesSectionEl.style.display = "none";
          btnPrimary.textContent = "OK";
          btnSecondary.style.display = "none";
          renderVersions(payload.currentVersion, "");
          return;
        }

        badgeTextEl.textContent = "Update available";
        titleEl.textContent = `${formatVersion(payload.nextVersion)} is available`;
        subtitleEl.textContent = "Stay on the latest build for fixes, performance, and new features.";
        btnPrimary.textContent = "Download update";
        btnSecondary.textContent = "Not now";
        renderVersions(payload.currentVersion, payload.nextVersion);

        if (payload.notesHtml) {
          notesEl.innerHTML = payload.notesHtml;
          notesEl.classList.remove("empty");
        } else {
          notesEl.textContent = "This release includes improvements and bug fixes.";
          notesEl.classList.add("empty");
        }
      }

      btnSecondary.addEventListener("click", () => {
        window.updateDialog.respond("secondary");
      });

      btnPrimary.addEventListener("click", () => {
        window.updateDialog.respond("primary");
      });

      // Update Notes Preview Data
      const previewData = {
        kind: "available",
        currentVersion: "2.1.2",
        nextVersion: "2.2.0",
        notesHtml:
          '<h3 class="note-heading">What&apos;s new in v2.2.0</h3>' +
          "<ul>" +
          "<li><strong>Live TV</strong> — Sri Lankan channels with rewind support</li>" +
          "<li>Improved stream reliability and faster channel switching</li>" +
          "<li>Bug fixes for the desktop player and startup splash</li>" +
          "</ul>" +
          "<p>Thank you for using <code>CHITHRA — CINEMA</code>.</p>",
      };

      if (window.updateDialog) {
        window.updateDialog.onInit(render);
      } else {
        render(previewData);
      }
    </script>
  </body>
</html>
