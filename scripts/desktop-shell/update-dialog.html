<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>CHITHRA — Update</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e65100;
      --orange-light: #ff7b1c;
      --orange-glow: rgba(230,81,0,0.15);
      --bg: #f2f4f8;
      --card: #ffffff;
      --border: #e2e4e9;
      --border-hover: #c8cad0;
      --text: #1e2025;
      --text-secondary: #5f636b;
      --text-muted: #92969e;
      --radius: 16px;
      --btn-radius: 10px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-app-region: no-drag;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      padding: 28px 24px 24px;
      animation: in 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes in {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .badge-uptodate {
      background: #e6f7e6;
      border: 1px solid #b7dfb9;
      color: #2e7d32;
    }

    .badge-available {
      background: #fff0e6;
      border: 1px solid #ffc9a6;
      color: var(--orange);
    }

    .badge-ready {
      background: #fffce6;
      border: 1px solid #ffe082;
      color: #b8860b;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .btn-close {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-close:hover {
      background: #f0f1f4;
      border-color: var(--border-hover);
      color: var(--text);
    }

    .body {
      text-align: center;
      padding: 4px 0;
    }

    .icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .icon-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-ring-uptodate {
      background: #e6f7e6;
    }

    .icon-ring-available {
      background: #fff0e6;
    }

    .icon-ring-ready {
      background: #fffce6;
    }

    .icon-ring svg {
      width: 28px;
      height: 28px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .sub {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .version-bar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f8f9fb;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .version-bar strong {
      color: var(--text);
      font-weight: 650;
    }

    .notes-wrap {
      text-align: left;
      margin-top: 16px;
      max-height: 160px;
      overflow-y: auto;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f8f9fb;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      scrollbar-width: thin;
      scrollbar-color: #d0d2d8 transparent;
    }

    .notes-wrap::-webkit-scrollbar { width: 4px; }
    .notes-wrap::-webkit-scrollbar-track { background: transparent; }
    .notes-wrap::-webkit-scrollbar-thumb { background: #d0d2d8; border-radius: 2px; }

    .notes-wrap.hidden { display: none; }

    .notes-wrap p { margin-bottom: 8px; }
    .notes-wrap p:last-child { margin-bottom: 0; }
    .notes-wrap ul { padding-left: 16px; margin-bottom: 8px; }
    .notes-wrap li { margin-bottom: 4px; }
    .notes-wrap li::marker { color: var(--orange); }
    .notes-wrap code {
      padding: 1px 6px;
      border-radius: 5px;
      background: #fff0e6;
      color: var(--orange);
      font-size: 0.9em;
    }

    .footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .footer button {
      flex: 1;
      padding: 11px 16px;
      border-radius: var(--btn-radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-secondary {
      background: #f0f1f4;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: #e4e6eb;
      border-color: var(--border-hover);
      color: var(--text);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: white;
      box-shadow: 0 4px 16px var(--orange-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px var(--orange-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary-solo {
      max-width: 180px;
      margin: 0 auto;
    }

    .footer.solo {
      justify-content: center;
    }

    .footer.solo button {
      flex: 0 1 auto;
      min-width: 100px;
    }
  </style>
</head>
<body>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="title">
    <div class="top">
      <div class="badge" id="badge">
        <span class="badge-dot"></span>
        <span id="badge-text">Update</span>
      </div>
      <button type="button" class="btn-close" id="btn-close" aria-label="Close">&#x2715;</button>
    </div>

    <div class="body">
      <div class="icon-wrap" id="icon-wrap">
        <div class="icon-ring" id="icon-ring">
          <svg id="icon-check" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <svg id="icon-download" viewBox="0 0 24 24" fill="none" stroke="#e65100" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <svg id="icon-restart" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </div>
      </div>

      <h1 id="title">Title</h1>
      <p class="sub" id="subtitle">Subtitle</p>

      <div class="version-bar" id="version-bar">
        Installed <strong id="version-text">v?.?.?</strong>
      </div>

      <div class="notes-wrap hidden" id="notes-wrap">
        <div id="notes"></div>
      </div>
    </div>

    <div class="footer solo" id="footer">
      <button type="button" class="btn-secondary" id="btn-secondary" style="display:none">Not now</button>
      <button type="button" class="btn-primary btn-primary-solo" id="btn-primary">OK</button>
    </div>
  </div>

  <script src="update-dialog-renderer.js"></script>
</body>
</html>
